name: CodeQL

# Análisis estático de seguridad (SAST) del código Python de SlopGuard.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 4 * * 1" # lunes 04:23 UTC

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analizar (python)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Inicializar CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-extended
          # SAST sobre el codigo SHIPPEADO (src/). El harness de tests hace
          # aserciones tipo `"host" in resultado` y planta violaciones a proposito
          # (guardias anti-vacuos), lo que dispara falsos positivos de
          # py/incomplete-url-substring-sanitization sin ser vulnerabilidades reales.
          config: |
            paths-ignore:
              - tests
              - scripts

      - name: Analizar
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"
