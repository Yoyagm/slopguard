name: SaaS CI

# Gate de calidad del SaaS (Hito 5): apps/api + apps/web.
# El gate del motor (slopguard-ci.yml) permanece intacto e independiente.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancela ejecuciones obsoletas del mismo ref para feedback rápido.
concurrency:
  group: saas-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API · Lint · Tipos · Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          # Cachea según ambos manifiestos: el motor (raíz) y el API.
          cache-dependency-path: |
            pyproject.toml
            apps/api/pyproject.toml

      - name: Instalar motor slopguard (editable + dev, zero-deps en runtime)
        # `[dev]` del core trae import-linter, requerido por el paso lint-imports.
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Instalar apps/api[dev]
        working-directory: apps/api
        run: pip install -e ".[dev]"

      - name: lint-imports (frontera motor ↛ apps/api — NFR-Arq.2 / ADR-5)
        # Verifica el contrato import-linter del core desde la raíz del repo: el motor
        # NUNCA importa el SaaS (`app`). Una regresión de frontera DEBE romper el CI.
        run: lint-imports

      - name: Ruff (lint + reglas de seguridad S)
        working-directory: apps/api
        run: ruff check .

      - name: Mypy (tipado estricto)
        working-directory: apps/api
        run: mypy app

      - name: Pytest
        working-directory: apps/api
        run: python -m pytest -q

  web:
    name: Web · Lint · Tipos · Tests · Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # pnpm 11 para casar el lockfile generado localmente (lockfileVersion 9.0).
      - name: Instalar pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Configurar Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          # Lockfile único del workspace (apps/web es miembro del workspace de la raíz).
          cache-dependency-path: pnpm-lock.yaml

      - name: Instalar dependencias del workspace (frozen lockfile)
        # Install en la raíz del workspace; apps/web se resuelve como miembro.
        run: pnpm install --frozen-lockfile

      - name: ESLint
        working-directory: apps/web
        run: pnpm lint

      - name: Typecheck (tsc --noEmit)
        working-directory: apps/web
        run: pnpm typecheck

      - name: Tests (Vitest)
        working-directory: apps/web
        run: pnpm test

      - name: Build (next build)
        working-directory: apps/web
        run: pnpm build
