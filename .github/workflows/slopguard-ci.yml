name: SlopGuard CI

# Gates de calidad de SlopGuard (Hito 1).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancela ejecuciones obsoletas del mismo ref para feedback rápido.
concurrency:
  group: slopguard-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Tipos · Arquitectura · Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Instalar (editable + dev)
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Ruff (lint + reglas de seguridad S)
        run: ruff check .

      - name: Mypy (tipado estricto)
        run: mypy

      - name: Import-linter (contratos de arquitectura R10)
        run: lint-imports

      - name: Pytest + cobertura (gate global >= 90%)
        run: |
          pytest --cov=slopguard --cov-branch \
                 --cov-report=term-missing --cov-report=xml \
                 --cov-fail-under=90

      - name: Cobertura de paquetes criticos (>= 95%)
        run: |
          coverage report --fail-under=95 \
            --include="src/slopguard/core/net/*,src/slopguard/core/cache/*,src/slopguard/core/scoring/*,src/slopguard/core/layers/*,src/slopguard/core/dataset/*,src/slopguard/core/threatintel/*"

  docs:
    name: Documentacion LaTeX -> PDF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compilar documento tecnico (xelatex)
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: docs
          root_file: slopguard.tex
          latexmk_use_xelatex: true

      - name: Publicar PDF como artefacto
        uses: actions/upload-artifact@v7
        with:
          name: slopguard-doc-tecnico
          path: docs/slopguard.pdf
          if-no-files-found: error
