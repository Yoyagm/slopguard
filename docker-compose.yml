# docker-compose.yml — Stack local de desarrollo de SlopGuard SaaS (H5-T07).
#
# Servicios:
#   postgres  → Postgres 16 con volumen persistente.
#   redis     → Redis 7 (cola Arq + state OAuth + rate-limit).
#   api       → FastAPI + uvicorn (imagen compartida con worker).
#   worker    → Arq worker (placeholder hasta Ola 5; mismo Dockerfile que api).
#
# Uso:
#   cp apps/api/.env.example apps/api/.env   # rellenar los valores
#   docker compose up --build
#
# Las variables sensibles entran SOLO por env_file; nunca se hardcodean aquí.
# (NFR-Seg: cero secretos en el YAML versionado.)

services:

  # ── Postgres ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: slopguard
      POSTGRES_PASSWORD: slopguard        # solo dev local; producción usa Neon (ADR-1)
      POSTGRES_DB: slopguard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Expuesto solo en loopback para herramientas locales (psql, DBeaver).
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slopguard -d slopguard"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Migrate (Alembic — one-shot, corre y sale) ─────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: runtime
    # "migrate" → el entrypoint ejecuta `alembic upgrade head` y termina (no es un servicio
    # de larga vida). api y worker dependen de su finalización exitosa.
    command: ["migrate"]
    # restart "no": es one-shot; no debe reiniciarse al salir 0.
    restart: "no"
    env_file:
      - path: apps/api/.env
        required: false
    environment:
      # Solo necesita la URL de Postgres (alembic no toca Redis).
      DATABASE_URL: postgresql+psycopg://slopguard:slopguard@postgres:5432/slopguard
    depends_on:
      postgres:
        condition: service_healthy

  # ── API (FastAPI + uvicorn) ────────────────────────────────────────────────
  api:
    build:
      # El contexto es la raíz del monorepo: el Dockerfile necesita src/slopguard
      # y apps/api juntos en el mismo contexto para el install editable.
      context: .
      dockerfile: apps/api/Dockerfile
      target: runtime
    restart: unless-stopped
    # Comando explícito para el entrypoint: "api" inicia uvicorn.
    command: ["api"]
    env_file:
      # Variables desde apps/api/.env (gitignored). OPCIONAL: sin él, el API arranca en modo
      # development con defaults. Para OAuth/GitHub App/LLM, copia apps/api/.env.example → .env.
      - path: apps/api/.env
        required: false
    environment:
      # Sobrescribe DATABASE_URL / REDIS_URL para apuntar a los servicios del compose.
      # Estas URLs son internas a la red Docker (nombre de servicio como host).
      DATABASE_URL: postgresql+psycopg://slopguard:slopguard@postgres:5432/slopguard
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        # Arranca solo tras aplicar el esquema (one-shot que sale 0).
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Worker (Arq — escaneo de PR en segundo plano) ─────────────────────────
  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: runtime
    restart: unless-stopped
    # "worker" → el entrypoint ejecuta `arq app.worker.main.WorkerSettings`.
    command: ["worker"]
    env_file:
      - path: apps/api/.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://slopguard:slopguard@postgres:5432/slopguard
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        # Arranca solo tras aplicar el esquema (one-shot que sale 0).
        condition: service_completed_successfully
    healthcheck:
      # `arq --check` lee la clave de salud que el worker escribe en Redis y sale 0 si está vivo.
      test: ["CMD", "arq", "app.worker.main.WorkerSettings", "--check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Web (Next.js — dashboard) ──────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # URL pública del API que el NAVEGADOR usa (corre en el host, no en la red Docker):
        # por eso apunta al puerto publicado del api en localhost, no al nombre de servicio.
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/login', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
