# Monorepo SlopGuard (Hito 5 SaaS).
# El motor de detección vive en `src/slopguard` (Python, zero-deps) y NO es parte del
# workspace de pnpm. Aquí solo se declaran los paquetes Node (el frontend).
packages:
  - "apps/web"

# No ejecutamos build scripts nativos de dependencias (sharp, unrs-resolver): no hacen falta para
# lint/typecheck/build (next build funciona sin el binario de sharp; unrs-resolver trae binarios
# precompilados). Los declaramos ignorados para silenciar el aviso en install, y desactivamos la
# verificación pre-script para que `pnpm lint|typecheck|build` corran de forma determinista en
# local y CI sin requerir `pnpm approve-builds` interactivo.
verifyDepsBeforeRun: false
allowBuilds:
  # esbuild (dev, vía vitest) SÍ necesita su build para instalar su binario de plataforma.
  esbuild: true
  sharp: false
  unrs-resolver: false
